<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Quiz Challenge</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>

:root{
  --purple:#6b2fbd;
  --blue:#3f6fb4;
  --orange1:#ffcf6e;
  --orange2:#f39a3e;
  --orange3:#e98026;
}

body{
  margin:0;
  font-family:'Nunito', Arial, sans-serif;
  display:flex;
  justify-content:center;

  background:
    radial-gradient(circle at 50% 10%, rgba(255,236,160,.7), rgba(255,236,160,0) 35%),
    repeating-linear-gradient(45deg, rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 2px, transparent 2px, transparent 6px),
    linear-gradient(180deg, var(--orange1), var(--orange2), var(--orange3));

  min-height:100vh;
}

.app{
  width:100%;
  max-width:430px;
  min-height:100vh;
  text-align:center;
  padding:28px 20px 20px;
  box-sizing:border-box;
}

.title{
  font-family:'Fredoka One','Arial Black',sans-serif;
  color:var(--purple);
  line-height:1;
  margin:0;
  font-size:60px;
  letter-spacing:1px;
  text-shadow:2px 2px 4px rgba(0,0,0,.35);
}

.subtitle{
  font-family:'Fredoka One','Arial Black',sans-serif;
  font-size:28px;
  color:var(--purple);
  margin:8px 0 0;
}

.subline{
  font-size:22px;
  color:var(--purple);
  font-weight:900;
  margin:10px 0 0;
  text-shadow:2px 2px 4px rgba(0,0,0,.35);
}

.hero{
  margin-top:10px;
}

.hero img{
  width:340px;
  max-width:100%;
  margin-bottom:-10px;
}

.primary-btn{
  background:var(--blue);
  color:white;
  border:none;
  font-family:'Fredoka One', Arial, sans-serif;
  font-size:22px;
  padding:18px 28px;
  border-radius:40px;
  cursor:pointer;
  width:80%;
  max-width:300px;
  box-shadow:0 4px 14px rgba(0,0,0,.2);
  margin-top:4px;
}

.screen{display:none;}
.screen.active{display:block;}

.menu-btn{
  width:90%;
  max-width:350px;
  margin:12px auto;
  padding:18px;
  border-radius:18px;
  border:3px solid var(--purple);
  background:#eee;
  font-size:20px;
  font-weight:bold;
  color:var(--purple);
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:14px;
  cursor:pointer;
}

.menu-footer{
  margin-top:20px;
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.footer-btn{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:3px solid var(--purple);
  background:#eee;
  color:var(--purple);
  font-weight:bold;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

<section id="splash" class="screen active">

<h1 class="title">Bible Quiz<br>Challenge</h1>

<div class="subtitle">1001 Questions</div>

<div class="subline">Test Your Bible Knowledge</div>

<div class="hero">
<div align="left">
<img src="images/splash.png" width="250">
</div>
</div>

<button id="startBtn" class="primary-btn">Start Quiz</button>

</section>

<section id="menu" class="screen">

<h1 class="title">Bible Quiz<br>Challenge</h1>

<div class="subtitle">Choose Your Challenge</div>

<button class="menu-btn">🎓 General Bible Trivia</button>
<button class="menu-btn">📣 Who said it?</button>
<button class="menu-btn">⏳ Bible Timeline</button>
<button class="menu-btn">📖 Finish the Verse</button>
<button class="menu-btn">🔥 Prophecy Quiz</button>

<div class="menu-footer">
<button class="footer-btn">High Scores</button>
<button class="footer-btn">My Stats</button>
<button class="footer-btn">About</button>
</div>

</section>

</div>

<script>
document.getElementById("startBtn").onclick=()=>{
document.getElementById("splash").classList.remove("active")
document.getElementById("menu").classList.add("active")
}
</script>

</body>
</html>
