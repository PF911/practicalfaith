<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Quiz Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--purple:#6b2fbd;--blue:#3f6fb4;--orange1:#ffcf6e;--orange2:#f39a3e;--orange3:#e98026;--green:#3e9b4f;--red:#c84545;}
body{margin:0;font-family:'Nunito',Arial,sans-serif;display:flex;justify-content:center;background:linear-gradient(180deg,var(--orange1),var(--orange2),var(--orange3));min-height:100vh;}
.app{position:relative;width:100%;max-width:430px;min-height:100vh;text-align:center;padding:28px 20px 20px;box-sizing:border-box;}
.title{font-family:'Fredoka One','Arial Black',sans-serif;color:var(--purple);line-height:1;margin:0;font-size:60px;letter-spacing:1px;text-shadow:2px 2px 4px rgba(0,0,0,.35);}
.subtitle{font-family:'Fredoka One','Arial Black',sans-serif;font-size:28px;color:var(--purple);margin:8px 0 0;}
.subline{font-size:22px;color:var(--purple);font-weight:900;margin:10px 0 0;text-shadow:2px 2px 4px rgba(0,0,0,.35);}
.hero{margin-top:10px;}
.hero img{width:340px;max-width:100%;margin-bottom:-10px;}
.primary-btn{background:var(--blue);color:white;border:none;font-family:'Fredoka One',Arial,sans-serif;font-size:22px;padding:18px 28px;border-radius:40px;cursor:pointer;width:80%;max-width:300px;box-shadow:0 4px 14px rgba(0,0,0,.2);margin-top:4px;}
.screen{position:absolute;top:0;left:0;width:100%;opacity:0;visibility:hidden;transition:opacity .4s ease;}
.screen.active{opacity:1;visibility:visible;}
.menu-btn{width:90%;max-width:350px;margin:12px auto;padding:18px;border-radius:18px;border:3px solid var(--purple);background:#eee;font-size:20px;font-weight:bold;color:var(--purple);display:flex;align-items:center;justify-content:flex-start;gap:14px;cursor:pointer;}
.menu-icon{width:52px;height:52px;object-fit:contain;flex-shrink:0;display:block;}
.bottom{margin-top:20px;display:flex;justify-content:space-between;gap:10px;}
.small-btn{flex:1;padding:10px 18px;height:50px;border-radius:16px;border:3px solid var(--purple);background:#eee;color:var(--purple);font-weight:bold;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.level-subtitle{min-height:34px;}
.level-note{color:var(--purple);font-size:18px;font-weight:700;margin:8px 0 14px;}
.back-row{width:90%;max-width:350px;margin:20px auto 0;}
.back-row .small-btn{width:100%;}
.quiz-card{width:90%;max-width:350px;margin:14px auto 0;padding:18px 16px;border-radius:20px;border:3px solid var(--purple);background:#eee;color:var(--purple);box-sizing:border-box;}
.quiz-meta{font-size:16px;font-weight:900;margin-bottom:12px;}
.question-text{font-size:24px;font-weight:900;line-height:1.2;margin:6px 0 10px;}
.answer-btn{width:100%;margin:10px 0;padding:14px 16px;border-radius:16px;border:3px solid var(--purple);background:#fff;color:var(--purple);font-size:18px;font-weight:800;text-align:left;cursor:pointer;}
.answer-btn.correct{background:#dff3e3;border-color:var(--green);color:#1f6f31;}
.answer-btn.wrong{background:#f9dede;border-color:var(--red);color:#8b2323;}
.answer-btn:disabled{cursor:default;}
.feedback{min-height:42px;font-size:21px;font-weight:900;margin-top:12px;line-height:1.2;}
.feedback.correct{color:var(--green);}
.feedback.wrong{color:var(--red);}
.verse-ref{min-height:22px;font-size:15px;font-weight:800;margin-top:6px;color:var(--purple);}
.verse-text{min-height:34px;font-size:14px;font-weight:700;line-height:1.3;margin-top:4px;color:var(--purple);font-style:italic;}
.quiz-next{margin-top:14px;}
.score-big{font-size:36px;color:var(--purple);font-weight:900;margin:14px 0 6px;}
.score-sub{color:var(--purple);font-size:22px;font-weight:800;margin:0 0 16px;}
.result-actions{width:90%;max-width:350px;margin:16px auto 0;display:flex;flex-direction:column;gap:12px;}
.result-actions .small-btn{width:100%;height:54px;}
</style>
</head>
<body>
<div class="app">

<section id="splash" class="screen active">
  <h1 class="title">Bible Quiz<br>Challenge</h1>
  <div class="subtitle">1001 Questions</div>
  <div class="subline">Test Your Bible Knowledge</div>
  <div class="hero"><div align="left"><img src="images/splash.png" width="250"></div></div>
  <button id="startBtn" class="primary-btn">Start Quiz</button>
</section>

<section id="menu" class="screen">
  <h1 class="title">Bible Quiz<br>Challenge</h1>
  <div class="subtitle">Choose Your Challenge</div>
  <button class="menu-btn" onclick="openLevelMenu('General Bible Trivia')"><img src="images/cap.png" class="menu-icon"> <span>General Bible Trivia</span></button>
  <button class="menu-btn" onclick="openLevelMenu('Who said it?')"><img src="images/phone.png" class="menu-icon"> <span>Who said it?</span></button>
  <button class="menu-btn" onclick="openLevelMenu('Bible Timeline')"><img src="images/timeline.png" class="menu-icon"> <span>Bible Timeline</span></button>
  <button class="menu-btn" onclick="openLevelMenu('Finish the Verse')"><img src="images/verses.png" class="menu-icon"> <span>Finish the Verse</span></button>
  <button class="menu-btn" onclick="openLevelMenu('Prophecy Quiz')"><img src="images/prophecy.png" class="menu-icon"> <span>Prophecy Quiz</span></button>
  <div class="bottom">
    <button class="small-btn">🏆 High Scores</button>
    <button class="small-btn">📊 My Stats</button>
    <button class="small-btn">ℹ️ About</button>
  </div>
</section>

<section id="levelMenu" class="screen">
  <h1 class="title">Bible Quiz<br>Challenge</h1>
  <div id="levelCategory" class="subtitle level-subtitle"></div>
  <div class="subline">Choose Your Level</div>
  <div class="level-note">Start where you feel comfortable</div>
  <button class="menu-btn" onclick="selectLevel('Beginner')"><img src="images/chick.png" class="menu-icon"> <span>Beginner</span></button>
  <button class="menu-btn" onclick="selectLevel('Student')"><img src="images/book.png" class="menu-icon"> <span>Student</span></button>
  <button class="menu-btn" onclick="selectLevel('Scholar')"><img src="images/cap2.png" class="menu-icon"> <span>Scholar</span></button>
  <div class="back-row"><button class="small-btn" onclick="showScreen('menu')">← Back to Menu</button></div>
</section>

<section id="quizScreen" class="screen">
  <h1 class="title">Bible Quiz<br>Challenge</h1>
  <div id="quizCategory" class="subtitle level-subtitle"></div>
  <div id="quizLevel" class="level-note"></div>
  <div class="quiz-card">
    <div id="quizMeta" class="quiz-meta"></div>
    <div id="questionText" class="question-text"></div>
    <button class="answer-btn" id="answer0" onclick="submitAnswer(0)"></button>
    <button class="answer-btn" id="answer1" onclick="submitAnswer(1)"></button>
    <button class="answer-btn" id="answer2" onclick="submitAnswer(2)"></button>
    <button class="answer-btn" id="answer3" onclick="submitAnswer(3)"></button>
    <div id="feedback" class="feedback"></div>
    <div id="verseRef" class="verse-ref"></div>
    <div id="verseText" class="verse-text"></div>
    <button id="nextBtn" class="small-btn quiz-next" style="display:none;" onclick="nextQuestion()">Next Question</button>
  </div>
  <div class="back-row"><button class="small-btn" onclick="showScreen('levelMenu')">← Back to Levels</button></div>
</section>

<section id="resultScreen" class="screen">
  <h1 class="title">Bible Quiz<br>Challenge</h1>
  <div id="resultCategory" class="subtitle level-subtitle"></div>
  <div id="resultLevel" class="level-note"></div>
  <div class="quiz-card">
    <div class="subline" style="margin-top:0;">Quiz Complete</div>
    <div id="scoreBig" class="score-big"></div>
    <div id="scoreSub" class="score-sub"></div>
  </div>
  <div class="result-actions">
    <button class="small-btn" onclick="restartLevel()">🔁 Play This Level Again</button>
    <button class="small-btn" onclick="showScreen('levelMenu')">📚 Choose Another Level</button>
    <button class="small-btn" onclick="showScreen('menu')">🏠 Back to Menu</button>
  </div>
</section>

</div>

<script>
const quizzes = {
  "General Bible Trivia": {
    "Beginner": [
      { question: "Who built the ark?", answers: ["Noah", "Moses", "Abraham", "David"], correct: 0, verse: "Genesis 6:14", verseText: "Make yourself an ark of gopher wood." },
      { question: "Who was swallowed by a great fish?", answers: ["Jonah", "Peter", "Samuel", "Joseph"], correct: 0, verse: "Jonah 1:17", verseText: "The Lord had prepared a great fish to swallow Jonah." },
      { question: "Who killed Goliath?", answers: ["Solomon", "David", "Saul", "Elijah"], correct: 1, verse: "1 Samuel 17:50", verseText: "David prevailed over the Philistine with a sling and a stone." }
    ],
    "Student": [
      { question: "How many days and nights did it rain during the Flood?", answers: ["30", "40", "50", "70"], correct: 1, verse: "Genesis 7:12", verseText: "The rain was on the earth forty days and forty nights." },
      { question: "How many brothers did Joseph have?", answers: ["10", "11", "12", "13"], correct: 1, verse: "Genesis 37:2", verseText: "Joseph... was feeding the flock with his brothers." },
      { question: "Who led Israel after Moses died?", answers: ["Caleb", "Aaron", "Joshua", "Samuel"], correct: 2, verse: "Joshua 1:1-2", verseText: "Moses my servant is dead... arise, go over this Jordan." }
    ],
    "Scholar": [
      { question: "How old was Noah when the floodwaters came upon the earth?", answers: ["500", "550", "600", "650"], correct: 2, verse: "Genesis 7:6", verseText: "Noah was six hundred years old when the floodwaters were on the earth." },
      { question: "On what mountain did the ark come to rest?", answers: ["Sinai", "Ararat", "Carmel", "Hermon"], correct: 1, verse: "Genesis 8:4", verseText: "The ark rested... upon the mountains of Ararat." },
      { question: "Who interpreted the handwriting on the wall for Belshazzar?", answers: ["Isaiah", "Jeremiah", "Ezekiel", "Daniel"], correct: 3, verse: "Daniel 5:25-28", verseText: "This is the inscription that was written: MENE, MENE, TEKEL, UPHARSIN." }
    ]
  },

  "Who said it?": {
    "Beginner": [
      { question: 'Who said, "Let my people go"?', answers: ["Moses", "Aaron", "Pharaoh", "Joshua"], correct: 0, verse: "Exodus 5:1", verseText: "Thus says the Lord God of Israel: Let My people go." },
      { question: 'Who said, "Speak, Lord, for your servant is listening"?', answers: ["Samuel", "David", "Solomon", "Isaiah"], correct: 0, verse: "1 Samuel 3:10", verseText: "Speak, for Your servant hears." },
      { question: 'Who said, "Am I my brother\\'s keeper?"', answers: ["Esau", "Cain", "Jacob", "Saul"], correct: 1, verse: "Genesis 4:9", verseText: "I do not know. Am I my brother's keeper?" }
    ],
    "Student": [
      { question: 'Who said, "Choose this day whom you will serve"?', answers: ["Joshua", "Moses", "Elijah", "Peter"], correct: 0, verse: "Joshua 24:15", verseText: "Choose for yourselves this day whom you will serve." },
      { question: 'Who said, "Here am I; send me"?', answers: ["Jeremiah", "Ezekiel", "Isaiah", "Samuel"], correct: 2, verse: "Isaiah 6:8", verseText: "Here am I! Send me." },
      { question: 'Who said, "As for me and my house, we will serve the Lord"?', answers: ["David", "Joshua", "Nehemiah", "Abraham"], correct: 1, verse: "Joshua 24:15", verseText: "As for me and my house, we will serve the Lord." }
    ],
    "Scholar": [
      { question: 'Who said, "Though he slay me, yet will I trust in him"?', answers: ["David", "Job", "Jeremiah", "Paul"], correct: 1, verse: "Job 13:15", verseText: "Though He slay me, yet will I trust Him." },
      { question: 'Who said, "I know that my redeemer lives"?', answers: ["Isaiah", "Daniel", "Job", "Thomas"], correct: 2, verse: "Job 19:25", verseText: "For I know that my Redeemer lives." },
      { question: 'Who said, "Whom shall I send, and who will go for us?"', answers: ["The Lord", "Moses", "Isaiah", "Gabriel"], correct: 0, verse: "Isaiah 6:8", verseText: "Whom shall I send, and who will go for Us?" }
    ]
  },

  "Bible Timeline": {
    "Beginner": [
      { question: "Which came first?", answers: ["The Flood", "Creation", "Exodus", "David becomes king"], correct: 1, verse: "Genesis 1:1", verseText: "In the beginning God created the heavens and the earth." },
      { question: "Which happened after Moses led Israel out of Egypt?", answers: ["Jesus was born", "The Temple was built", "Israel crossed the Red Sea", "David fought Goliath"], correct: 2, verse: "Exodus 14:21-22", verseText: "The children of Israel went into the midst of the sea on the dry ground." },
      { question: "Which happened before the birth of Jesus?", answers: ["Paul's conversion", "The exile to Babylon", "Pentecost", "The resurrection"], correct: 1, verse: "2 Kings 25:8-11", verseText: "He carried into captivity all Jerusalem." }
    ],
    "Student": [
      { question: "Which came first?", answers: ["David becomes king", "Abraham leaves Haran", "Solomon builds the Temple", "Israel enters Canaan"], correct: 1, verse: "Genesis 12:4", verseText: "Abram departed as the Lord had spoken to him." },
      { question: "Which happened after David became king?", answers: ["Solomon builds the Temple", "The Flood", "Joseph goes to Egypt", "The Exodus"], correct: 0, verse: "1 Kings 6:1", verseText: "He began to build the house of the Lord." },
      { question: "Which came first?", answers: ["The Babylonian exile", "The ministry of Elijah", "The resurrection of Christ", "Pentecost"], correct: 1, verse: "1 Kings 17:1", verseText: "Elijah the Tishbite... said to Ahab." }
    ],
    "Scholar": [
      { question: "Which event belongs latest in the Old Testament timeline?", answers: ["The Flood", "Return from exile", "Exodus", "Judges"], correct: 1, verse: "Ezra 1:1-3", verseText: "Who is among you of all His people?... let him go up to Jerusalem." },
      { question: "Which happened first?", answers: ["Division of the kingdom", "Solomon's reign", "David's reign", "Samuel's ministry"], correct: 3, verse: "1 Samuel 3:19-20", verseText: "Samuel grew, and the Lord was with him." },
      { question: "Which came before the rebuilding of Jerusalem's walls?", answers: ["Nehemiah", "Ezra's return", "Pentecost", "John the Baptist"], correct: 1, verse: "Ezra 7:6-9", verseText: "Ezra came up from Babylon." }
    ]
  },

  "Finish the Verse": {
    "Beginner": [
      { question: 'Finish the verse: "The Lord is my shepherd; ____."', answers: ["I shall not want", "He is my rock", "I will fear no evil", "His mercy endures"], correct: 0, verse: "Psalm 23:1", verseText: "The Lord is my shepherd; I shall not want." },
      { question: 'Finish the verse: "In the beginning God created the ____ and the earth."', answers: ["light", "heavens", "angels", "sea"], correct: 1, verse: "Genesis 1:1", verseText: "In the beginning God created the heavens and the earth." },
      { question: 'Finish the verse: "Jesus wept." This verse is found in:', answers: ["John 11:35", "Matthew 5:9", "Luke 2:10", "Psalm 23:1"], correct: 0, verse: "John 11:35", verseText: "Jesus wept." }
    ],
    "Student": [
      { question: 'Finish the verse: "For all have sinned and fall short of the ____ of God."', answers: ["truth", "grace", "law", "glory"], correct: 3, verse: "Romans 3:23", verseText: "For all have sinned and fall short of the glory of God." },
      { question: 'Finish the verse: "Trust in the Lord with all thine heart; and lean not unto thine own ____."', answers: ["strength", "understanding", "wisdom", "way"], correct: 1, verse: "Proverbs 3:5", verseText: "Lean not on your own understanding." },
      { question: 'Finish the verse: "Thy word is a lamp unto my feet, and a ____ unto my path."', answers: ["light", "sword", "shield", "guide"], correct: 0, verse: "Psalm 119:105", verseText: "Your word is a lamp to my feet and a light to my path." }
    ],
    "Scholar": [
      { question: 'Finish the verse: "Man shall not live by bread alone, but by every word that proceeds out of the mouth of ____."', answers: ["the prophets", "God", "Moses", "the Lord of hosts"], correct: 1, verse: "Matthew 4:4", verseText: "Man shall not live by bread alone, but by every word that proceeds from the mouth of God." },
      { question: 'Finish the verse: "The just shall live by ____."', answers: ["works", "grace", "faith", "hope"], correct: 2, verse: "Habakkuk 2:4", verseText: "The just shall live by his faith." },
      { question: 'Finish the verse: "Be ye doers of the word, and not hearers only, deceiving your own ____."', answers: ["hearts", "selves", "minds", "souls"], correct: 1, verse: "James 1:22", verseText: "Be doers of the word, and not hearers only, deceiving yourselves." }
    ]
  },

  "Prophecy Quiz": {
    "Beginner": [
      { question: "Which prophet was swallowed by a great fish?", answers: ["Jonah", "Isaiah", "Elijah", "Amos"], correct: 0, verse: "Jonah 1:17", verseText: "Now the Lord had prepared a great fish to swallow Jonah." },
      { question: "Who interpreted dreams in Babylon?", answers: ["Daniel", "Jeremiah", "Micah", "Hosea"], correct: 0, verse: "Daniel 2:19", verseText: "The secret was revealed to Daniel in a night vision." },
      { question: "Who confronted the prophets of Baal on Mount Carmel?", answers: ["Elijah", "Elisha", "Nathan", "Joel"], correct: 0, verse: "1 Kings 18:22", verseText: "I alone am left a prophet of the Lord; but Baal's prophets are four hundred and fifty men." }
    ],
    "Student": [
      { question: "Which prophet foretold the Messiah would be born in Bethlehem?", answers: ["Micah", "Nahum", "Obadiah", "Haggai"], correct: 0, verse: "Micah 5:2", verseText: "Out of you shall come forth to Me the One to be Ruler in Israel." },
      { question: "Which prophet saw a valley of dry bones?", answers: ["Isaiah", "Daniel", "Ezekiel", "Zechariah"], correct: 2, verse: "Ezekiel 37:1-2", verseText: "He set me down in the midst of the valley; and it was full of bones." },
      { question: 'Which prophet declared, "The just shall live by faith"?', answers: ["Habakkuk", "Malachi", "Joel", "Zephaniah"], correct: 0, verse: "Habakkuk 2:4", verseText: "The just shall live by his faith." }
    ],
    "Scholar": [
      { question: "Which prophet spoke of seventy weeks determined upon thy people?", answers: ["Isaiah", "Daniel", "Jeremiah", "Zechariah"], correct: 1, verse: "Daniel 9:24", verseText: "Seventy weeks are determined for your people and for your holy city." },
      { question: "Which prophet described the coming Messenger who would prepare the way?", answers: ["Malachi", "Amos", "Hosea", "Obadiah"], correct: 0, verse: "Malachi 3:1", verseText: "Behold, I send My messenger, and he will prepare the way before Me." },
      { question: 'Which prophet said, "They shall look upon me whom they have pierced"?', answers: ["Zechariah", "Joel", "Isaiah", "Micah"], correct: 0, verse: "Zechariah 12:10", verseText: "They will look on Me whom they pierced." }
    ]
  }
};

const correctMessages = ["Whoa, nice!","Great job!","Excellent!","You got it!","Well done!","Nice one!"];
const incorrectMessages = ["Ooh, I'm sorry, that's incorrect.","Close, but that's not right.","Not quite.","Good try, but that's incorrect.","Almost!","That's not the right answer."];
const tryAgainMessages = ["Close, but that's not right. Try again!","Not quite. Take one more shot!","Ooh, not that one. Try again!","Good try — give it one more go!","Almost! Try once more!"];
const recoveryMessages = ["Nice recovery!","Good catch!","You got it on the second try!","Well done — you found it!","There you go!"];

let currentCategory = '';
let currentLevel = '';
let currentQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let answered = false;
let correctStreak = 0;
let attemptsThisQuestion = 0;

function showScreen(screenId){
  const screens = document.querySelectorAll('.screen');
  screens.forEach(screen => screen.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}
function randomFrom(list){ return list[Math.floor(Math.random()*list.length)]; }
function correctFeedbackMessage(){
  if(attemptsThisQuestion === 2) return randomFrom(recoveryMessages);
  if(correctStreak >= 5) return "You're on fire!";
  if(correctStreak === 4) return "Impressive streak!";
  if(correctStreak === 3) return "Wow! You're on a roll!";
  if(correctStreak === 2) return "Nice! You're getting warmed up!";
  return randomFrom(correctMessages);
}
function incorrectFeedbackMessage(){ return randomFrom(incorrectMessages); }
function tryAgainFeedbackMessage(){ return randomFrom(tryAgainMessages); }

document.getElementById('startBtn').onclick = () => showScreen('menu');

function openLevelMenu(category){
  currentCategory = category;
  document.getElementById('levelCategory').textContent = category;
  showScreen('levelMenu');
}

function selectLevel(level){
  currentLevel = level;
  currentQuestions = quizzes[currentCategory][currentLevel];
  currentQuestionIndex = 0;
  score = 0;
  correctStreak = 0;
  loadQuestion();
  showScreen('quizScreen');
}

function loadQuestion(){
  answered = false;
  attemptsThisQuestion = 0;
  const q = currentQuestions[currentQuestionIndex];
  document.getElementById('quizCategory').textContent = currentCategory;
  document.getElementById('quizLevel').textContent = currentLevel;
  document.getElementById('quizMeta').textContent = 'Question ' + (currentQuestionIndex + 1) + ' of ' + currentQuestions.length;
  document.getElementById('questionText').textContent = q.question;

  const labels = ['A)','B)','C)','D)'];
  q.answers.forEach((answer, index) => {
    const btn = document.getElementById('answer' + index);
    btn.textContent = labels[index] + ' ' + answer;
    btn.className = 'answer-btn';
    btn.disabled = false;
  });

  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('verseRef').textContent = '';
  document.getElementById('verseText').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';
}

function showVerse(q, showCorrect){
  document.getElementById('verseRef').textContent =
    showCorrect ? ('Correct answer: ' + q.answers[q.correct] + ' — ' + q.verse) : q.verse;
  document.getElementById('verseText').textContent = q.verseText || '';
}

function submitAnswer(index){
  if(answered) return;

  attemptsThisQuestion++;
  const q = currentQuestions[currentQuestionIndex];
  const buttons = document.querySelectorAll('.answer-btn');
  const feedback = document.getElementById('feedback');

  if(index === q.correct){
    answered = true;
    score++;
    correctStreak++;
    buttons.forEach(btn => btn.disabled = true);
    buttons[q.correct].classList.add('correct');
    feedback.textContent = correctFeedbackMessage();
    feedback.className = 'feedback correct';
    showVerse(q, false);
    const nextBtn = document.getElementById('nextBtn');
    nextBtn.textContent = currentQuestionIndex < currentQuestions.length - 1 ? 'Next Question' : 'See Score';
    nextBtn.style.display = 'flex';
    return;
  }

  buttons[index].classList.add('wrong');
  buttons[index].disabled = true;

  if(attemptsThisQuestion === 1){
    correctStreak = 0;
    feedback.textContent = tryAgainFeedbackMessage();
    feedback.className = 'feedback wrong';
    return;
  }

  answered = true;
  correctStreak = 0;
  buttons[q.correct].classList.add('correct');
  buttons.forEach(btn => btn.disabled = true);
  feedback.textContent = incorrectFeedbackMessage();
  feedback.className = 'feedback wrong';
  showVerse(q, true);
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = currentQuestionIndex < currentQuestions.length - 1 ? 'Next Question' : 'See Score';
  nextBtn.style.display = 'flex';
}

function nextQuestion(){
  currentQuestionIndex++;
  if(currentQuestionIndex < currentQuestions.length) loadQuestion();
  else showResults();
}

function showResults(){
  document.getElementById('resultCategory').textContent = currentCategory;
  document.getElementById('resultLevel').textContent = currentLevel;
  document.getElementById('scoreBig').textContent = score + ' / ' + currentQuestions.length;
  document.getElementById('scoreSub').textContent = scoreText(score, currentQuestions.length);
  showScreen('resultScreen');
}

function scoreText(score, total){
  if(score === total) return 'Perfect score!';
  if(score >= total - 1) return 'Excellent work!';
  if(score >= Math.ceil(total / 2)) return 'Nice job!';
  return 'Good start — try again!';
}

function restartLevel(){
  currentQuestionIndex = 0;
  score = 0;
  correctStreak = 0;
  loadQuestion();
