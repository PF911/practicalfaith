<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practical Faith</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background-color: #f5f0e8;
            text-align: center;
            min-height: 100vh;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        /* Banner */
        .banner-wrap {
            width: 100%;
            margin-bottom: 28px;
        }

        .banner-wrap img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.18);
        }

        /* Logo */
        .logo-wrap {
            margin: 0 auto 32px;
        }

        .logo-wrap img {
            width: 155px;
            height: 160px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.15));
        }

        /* Store buttons section */
        .store-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            margin-bottom: 18px;
        }

        .store-buttons a {
            display: block;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .store-buttons a:hover {
            transform: scale(1.03);
            opacity: 0.92;
        }

        .store-buttons a:active {
            transform: scale(0.98);
        }

        .store-buttons img {
            width: 275px;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        /* YouTube button */
        .youtube-wrap {
            margin-top: 4px;
        }

        .youtube-wrap a {
            display: inline-block;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .youtube-wrap a:hover {
            transform: scale(1.03);
            opacity: 0.92;
        }

        .youtube-wrap a:active {
            transform: scale(0.98);
        }

        .youtube-wrap img {
            width: 275px;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        /* Responsive */
        @media only screen and (max-width: 480px) {
            .store-buttons img,
            .youtube-wrap img {
                width: 240px;
            }

            .logo-wrap img {
                width: 130px;
                height: 134px;
            }
        }
    </style>
</head>
<body>

    <div class="banner-wrap">
        <img src="docs/images/banner.png" alt="Practical Faith">
    </div>

    <div class="container">

        <div class="logo-wrap">
            <img src="docs/images/Logo.png" alt="Practical Faith Logo">
        </div>

        <div class="store-buttons">
            <a href="https://play.google.com/store/apps/details?id=com.practicalfaith.app2">
                <img src="docs/images/google.png" alt="Get it on Google Play">
            </a>
            <a href="https://apps.apple.com/us/app/practical-faith-app/id6757488499">
                <img src="docs/images/apple.png" alt="Download on the App Store">
            </a>
        </div>

        <div class="youtube-wrap">
            <a href="https://www.youtube.com/watch?v=F4ZY2JDsWCA&list=PLtJBBM9LiLYlsqOPyOtcPiMSSL3IauC92">
                <img src="docs/images/youtube.png" alt="Watch it on YouTube">
            </a>
        </div>

    </div>

</body>
</html>
